<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Words List</title>
</head>
<body>
    <table>
    <tbody>
    <tr>
      <td>Origin</td>

    </tbody>
    </table>
    <a href="add_word">Add word</a>

</html>
